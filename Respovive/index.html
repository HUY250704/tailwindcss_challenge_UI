<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Circles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-[#050a30] bg-cover bg-center bg-no-repeat relative overflow-hidden font-sans" style="background-image: url('./image/Export image.png');">

  <div class="min-h-screen w-full flex justify-center p-[24px] relative z-10">
    <div class="container max-w-[1140px] w-full grid grid-cols-1 md:grid-cols-2 gap-[48px] items-start pt-[120px]">
      
      <div class="text-white">
        <div class="flex items-center space-x-[20px] mb-[150px]">
          <img src="image/Logo.png" alt="Logo" class="w-[220px] h-auto object-contain">
          
        </div>
        
        <div class="space-y-[16px]">
          <h1 class="text-[56px] font-bold leading-[1.2]">
            Login into <br /> your account
          </h1>
          <p class="text-gray-400 text-[20px]">Let us make the circle bigger!</p>
        </div>
      </div>

      <div class="flex justify-center md:justify-end mt-[190px]">
        <div class="bg-white w-full max-w-[450px] rounded-[40px] p-[50px] shadow-2xl">
          <form class="space-y-[32px]">
            <div class="space-y-[8px]">
              <label class="text-[14px] font-semibold text-gray-500 block">Email</label>
              <input 
                type="email" 
                placeholder="name@example.com" 
                class="w-full px-[16px] py-[16px] rounded-[12px] border border-gray-200 focus:outline-none focus:ring-[2px] focus:ring-blue-500 transition text-gray-700 placeholder-gray-300"
              />
            </div>

            <div class="space-y-[8px]">
              <label class="text-[14px] font-semibold text-gray-500 block">Password</label>
              <input 
                type="password" 
                placeholder="Your password" 
                class="w-full px-[16px] py-[16px] rounded-[12px] border border-gray-200 focus:outline-none focus:ring-[2px] focus:ring-blue-500 transition text-gray-700 placeholder-gray-300"
              />
            </div>

            <div class="flex items-center justify-between pt-[16px]">
              <p class="text-[14px] text-gray-600">
                Don't have an account? 
                <a href="#" class="font-bold text-gray-900 hover:underline">Sign up</a>
              </p>
              <button 
                type="submit" 
                class="bg-[#2d5cf7] hover:bg-blue-700 text-white font-semibold py-[12px] px-[40px] rounded-[12px] shadow-lg shadow-blue-200 transition-all active:scale-[0.95]"
              >
                Login
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <footer class="absolute bottom-[24px] w-full text-center text-[12px] text-gray-500 opacity-80 z-10">
    © 2023 Circle. All Rights Reserved.
  </footer>

</body>
</html>
