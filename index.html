<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#FFFFFF]">

  <div class="flex flex-col lg:flex-row w-full min-h-screen">

    <!-- Panel bên trái lớn hơn -->
    <div class="flex flex-col lg:flex-row w-full min-h-screen">

    <div class="lg:w-2/3 w-full bg-gradient-to-b from-[#0575E6] via-[#02298A] to-[#021B79] text-white flex flex-col justify-center items-start p-12 p-[80px]">
    
    
      <h1 class="text-[80px] font-bold mb-[32px] ml-[32px]">GoFinance</h1>
      <p class="text-[24px] mb-[40px] ml-[32px]">The most popular peer to peer lending at SEA</p>
      <button class="bg-[#0575E6] hover:bg-[#02298A] text-white rounded-full font-semibold transition px-[40px] py-[20px] ml-[32px] text-[24px]">
        Read More
      </button>
    </div>

    <!-- Panel bên phải nhỏ hơn -->
    <div class="lg:w-[400px] w-full bg-[#FFFFFF] flex flex-col justify-center items-start relative p-[80px]">
      <span class="absolute text-[#FFFFFF] font-bold opacity-50 top-[-48px] left-[40px] text-[24px]">Login</span>

      <h1 class="text-[36px] font-bold mb-[24px] ml-[16px]">Hello Again!</h1>
      <p class="text-[#333333] text-[18px] mb-[40px] ml-[16px]">Welcome Back</p>

      <form class="space-y-6 lg:space-y-8 w-full max-w-md">
       
        <input type="password" placeholder="Password"
          class="w-full px-4 lg:px-6 py-3 lg:py-5 border border-[#EEEEEE] rounded-full text-base lg:text-lg focus:outline-none focus:ring-2 focus:ring-[#FFFFFF]" />

        <button type="submit"
          class="w-full bg-[#0575E6] text-white py-3 lg:py-5 rounded-full text-lg lg:text-xl font-semibold hover:bg- transition">Login</button>
      </form>

      <p class="mt-[32px] ml-[32px] text-[16px] text-[#333333]">
        Forgot Password? 
        <a href="#" class="text-[#02298A] hover:underline">Click Here</a>
      </p>
    </div>

  </div>

  <!-- Hình nền -->
  <img src="/image/Group 2.png"
       class="fixed bottom-0 left-0 opacity-70 w-[400px] h-auto"
       alt="decorative image">

</body>
</html>
